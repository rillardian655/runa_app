name: runa_app
description: "Ru.na — Aplikasi Chat & Voice Call"
publish_to: 'none'
version: 1.0.22+22

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - replacing Supabase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.6
  # Push notifications (OneSignal — no Firebase Admin Key needed)
  onesignal_flutter: ^5.2.6
  # Local notifications (kept for push notification display)
  flutter_local_notifications: ^17.2.4
  # WebRTC for voice/video calls
  flutter_webrtc: ^1.4.1
  # Encryption for messages
  cryptography: ^2.7.0
  # Media picking
  image_picker: ^1.0.5
  file_picker: ^12.0.0-beta.5
  # Video playback (status videos)
  video_player: ^2.9.2
  # Voice messages (record + playback)
  record: ^5.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  # Utilities
  intl: ^0.20.2
  provider: ^6.1.1
  go_router: ^17.3.0
  flutter_svg: ^2.0.9
  iconsax: ^0.0.8
  permission_handler: ^12.0.3
  http: ^1.2.0
  # Google Sign-In (optional OAuth)
  google_sign_in: ^6.2.1
  # App version info and updates
  package_info_plus: ^10.1.0
  url_launcher: ^6.2.5
  # Local key-value storage (theme preference, etc.)
  shared_preferences: ^2.2.2

# The `record` package pins its Linux desktop impl to <1.0.0, but those versions
# don't implement the current record_platform_interface (missing startStream /
# named-arg hasPermission) and fail to compile. The app only ships Android, yet
# Flutter's Dart plugin registrant imports every federated impl, so the Linux one
# must still compile. Pin it to a build that matches the resolved interface.
dependency_overrides:
  record_linux: 1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpg"
  min_sdk_android: 21


flutter:
  uses-material-design: true
  assets:
    - assets/
