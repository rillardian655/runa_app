name: runa_app
description: "Ru.na \u2014 Aplikasi Chat & Voice Call"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  flutter_webrtc: ^1.4.1
  cryptography: ^2.7.0
  flutter_secure_storage: ^10.3.1
  image_picker: ^1.0.5
  file_picker: ^12.0.0-beta.5
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  provider: ^6.1.1
  go_router: ^17.3.0
  flutter_svg: ^2.0.9
  iconsax: ^0.0.8
  path_provider: ^2.1.2
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true
