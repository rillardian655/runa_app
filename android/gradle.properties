org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Cap concurrent worker daemons and the Kotlin daemon so the build fits in
# physical RAM (this machine has no swap; an OOM kill shows up as exit 137).
org.gradle.workers.max=2
kotlin.daemon.jvmargs=-Xmx1536m
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
