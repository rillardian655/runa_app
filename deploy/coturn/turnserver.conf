###############################################################################
# coturn configuration for Ru.na   —   turn.vantageos.my.id
#
# Reference: https://github.com/coturn/coturn/wiki/turnserver
#
# SECRETS: every value marked REPLACE_* must be set on the SERVER copy only.
#          Do NOT commit real passwords / secrets / IPs back into git.
###############################################################################

# --- Network ----------------------------------------------------------------
listening-port=3478
tls-listening-port=5349

# Public IPv4 of this VPS. If the box is behind 1:1 NAT (cloud provider where
# the public IP is NOT on the local interface), use:  external-ip=PUB_IP/LOCAL_IP
external-ip=REPLACE_WITH_PUBLIC_IP

# UDP relay port range. These exact ports must be opened in BOTH the OS
# firewall (ufw) AND your cloud provider's edge firewall / 1:1-NAT port-forward.
# >>> If the box is behind provider NAT, opening ufw is NOT enough: inbound
#     3478, 5349 and this whole range must also be forwarded to the VM upstream,
#     or every client will only ever get STUN candidates (no "relay"). <<<
# Kept deliberately small (100 ports) so it is practical to port-forward.
min-port=49152
max-port=49251

# --- Realm / fingerprint ----------------------------------------------------
realm=turn.vantageos.my.id
server-name=turn.vantageos.my.id
fingerprint

# --- Authentication ---------------------------------------------------------
# (A) TIME-LIMITED credentials  ──  ENABLED. The app never carries a password;
#     the Supabase `turn-credentials` edge function mints short-lived creds with
#     the SAME secret below, and coturn validates them via HMAC. A leaked cred
#     expires on its own (24h). The secret here MUST equal the function's
#     TURN_SECRET env var.
use-auth-secret
static-auth-secret=REPLACE_WITH_LONG_RANDOM_SECRET

# (B) STATIC long-term credential (simpler fallback). To use this instead,
#     comment out the two lines above and uncomment the two below — but then
#     the password ships inside the APK and must be rotated by hand.
# lt-cred-mech
# user=runauser:REPLACE_WITH_STRONG_PASSWORD

# --- TLS (turns://) ---------------------------------------------------------
# A publicly-trusted cert is required — a Cloudflare *Origin* Certificate will
# NOT work here, because WebRTC clients don't trust Cloudflare's private CA.
# Use Let's Encrypt issued via the Cloudflare DNS-01 challenge (see install.sh).
# These paths are the coturn-readable COPIES made by the certbot deploy hook,
# because /etc/letsencrypt/live/* is root-only and coturn runs as 'turnserver'.
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
no-tlsv1
no-tlsv1_1

# --- Hardening --------------------------------------------------------------
no-cli
no-multicast-peers
stale-nonce=600

# CRITICAL on this box: coturn is co-hosted with self-hosted Supabase, whose
# Postgres / Docker services listen on localhost and private ranges. Without
# these denials, anyone holding a TURN credential could relay packets INTO
# your internal network (Postgres on 127.0.0.1:5432, Docker 172.x, etc.) and
# pivot. Deny the relay from ever reaching loopback / private / link-local.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# --- Abuse limits (tune to your bandwidth; 0 = unlimited) -------------------
# Max simultaneous allocations per username, and across the whole server.
user-quota=12
total-quota=1200
# Per-allocation bandwidth cap in bytes/sec. ~64 kbps voice fits in 8000.
# Leave commented for video calls. e.g. bps-capacity=0 means no cap.
# bps-capacity=0

# --- Logging ----------------------------------------------------------------
# Log via syslog (robust — no log-dir permission issues). Inspect with:
#   journalctl -u coturn -f      (systemd)   or   /var/log/syslog
syslog
# Uncomment ONLY while debugging — extremely chatty:
# verbose
